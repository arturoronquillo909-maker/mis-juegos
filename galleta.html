<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cyber-Chat Fixed</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --wa-green: #25D366; --wa-dark: #0b141a; --neon-blue: #00f3ff;
            --neon-gold: #ffcc00; --sent: #005c4b; --recv: #202c33;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: #000; color: white; height: 100vh; overflow: hidden; }

        /* Selector Principal */
        #selector { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 20px;
        }
        
        .btn { 
            padding: 20px; width: 80%; max-width: 300px; border-radius: 12px; border: none; 
            font-weight: bold; cursor: pointer; text-transform: uppercase;
            background: var(--wa-green); color: #000; box-shadow: 0 4px 0 #128c7e;
        }
        .btn:active { transform: translateY(2px); box-shadow: none; }

        .container { width: 100%; max-width: 450px; height: 100vh; margin: auto; display: flex; flex-direction: column; position: relative; }
        header { background: #111b21; padding: 15px; border-bottom: 1px solid var(--neon-blue); display: flex; justify-content: space-between; }

        /* Chat y Mensajes */
        .page { position: absolute; inset: 0; background: var(--wa-dark); display: none; flex-direction: column; z-index: 100; }
        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .bubble { max-width: 80%; padding: 10px; border-radius: 10px; font-size: 14px; }
        .s { align-self: flex-end; background: var(--sent); }
        .r { align-self: flex-start; background: var(--recv); }
        .t { font-size: 9px; color: var(--neon-blue); display: block; margin-top: 5px; text-align: right; }

        .input-row { padding: 10px; background: #111b21; display: flex; gap: 10px; }
        input { flex: 1; padding: 12px; border-radius: 20px; border: none; background: #2a3942; color: white; outline: none; }
    </style>
</head>
<body>

<div id="selector">
    <h1 style="color:var(--neon-blue); margin-bottom:20px;">CYBER-LINK</h1>
    <button class="btn" onclick="startApp('User_A')">USUARIO A</button>
    <button class="btn" onclick="startApp('User_B')">USUARIO B</button>
</div>

<div class="container">
    <header>
        <span id="display-id" style="color:var(--neon-blue)">ID: ---</span>
        <span style="color:var(--neon-gold)">⭐ 850</span>
    </header>

    <div id="contact-list" style="padding:20px;">
        <div style="background:#1c272d; padding:15px; border-radius:10px; border-left:4px solid var(--neon-blue)">
            <h4 id="target-id-label">Esperando...</h4>
            <button class="btn" style="width:100%; margin-top:10px; padding:10px;" onclick="document.getElementById('chat-page').style.display='flex'; render();">ABRIR CHAT</button>
        </div>
    </div>

    <div id="chat-page" class="page">
        <header>
            <button onclick="document.getElementById('chat-page').style.display='none'" style="background:none; border:none; color:var(--wa-green); font-size:20px;">←</button>
            <span id="chat-title">Chat</span>
            <div style="width:30px"></div>
        </header>
        <div id="chat-flow"></div>
        <div class="input-row">
            <input type="text" id="minput" placeholder="Escribe un mensaje...">
            <button class="btn" style="width:50px; padding:10px;" onclick="sendMsg()">➤</button>
        </div>
    </div>
</div>

<script>
    const S_URL = 'https://iitlcnrkgwobzckxwnau.supabase.co';
    const S_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlpdGxjbnJrZ3dvYnpja3h3bmF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NzcxMzQsImV4cCI6MjA5MDU1MzEzNH0.O4iyR4gF7GQO8AvDpTYRoKjqRsUdNc8hKM80YXboCmE';
    
    // ÚNICA DECLARACIÓN DE SUPABASE
    const supabaseClient = window.supabase.createClient(S_URL, S_KEY);

    let myId = "";
    let toId = "";
    let chatChannel = null;

    function startApp(id) {
        myId = id;
        toId = (id === 'User_A') ? 'User_B' : 'User_A';
        
        document.getElementById('selector').style.display = 'none';
        document.getElementById('display-id').innerText = "ID: " + myId;
        document.getElementById('target-id-label').innerText = "Contacto: " + toId;
        document.getElementById('chat-title').innerText = toId;

        // Suscribirse al canal
        chatChannel = supabaseClient.channel('p2p_room')
        .on('broadcast', { event: 'msg' }, (payload) => {
            if(payload.payload.to === myId) saveMessage(payload.payload, 'r');
        })
        .subscribe();
    }

    function sendMsg() {
        const inp = document.getElementById('minput');
        if(!inp.value) return;

        const data = {
            from: myId, to: toId, text: inp.value,
            time: Date.now(), exp: Date.now() + (30*60*1000)
        };

        chatChannel.send({ type: 'broadcast', event: 'msg', payload: data });
        saveMessage(data, 's');
        inp.value = "";
    }

    function saveMessage(msg, type) {
        let history = JSON.parse(localStorage.getItem('chat_' + myId) || '[]');
        msg.type = type;
        history.push(msg);
        localStorage.setItem('chat_' + myId, JSON.stringify(history));
        render();
    }

    function render() {
        const flow = document.getElementById('chat-flow');
        let history = JSON.parse(localStorage.getItem('chat_' + myId) || '[]');
        const now = Date.now();

        flow.innerHTML = "";
        history.filter(m => m.exp > now).forEach(m => {
            const diff = Math.round((m.exp - now) / 1000);
            const div = document.createElement('div');
            div.className = `bubble ${m.type}`;
            div.innerHTML = `${m.text} <span class="t">${Math.floor(diff/60)}:${(diff%60).toString().padStart(2,'0')}</span>`;
            flow.appendChild(div);
        });
        flow.scrollTop = flow.scrollHeight;
    }

    setInterval(() => {
        if(document.getElementById('chat-page').style.display === 'flex') render();
    }, 1000);
</script>
</body>
</html>
