<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cyber-Link Ultra</title>
    <style>
        :root { 
            --neon-pink: #ff007f; --neon-blue: #00f3ff; --neon-gold: #ffcc00; 
            --bg-dark: #0a0a0a; --glass: rgba(255, 255, 255, 0.08); 
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; -webkit-tap-highlight-color: transparent; }
        
        html, body { height: 100dvh; width: 100vw; overflow: hidden; background: #000; color: white; position: fixed; }
        .app-shell { width: 100%; height: 100%; display: flex; flex-direction: column; }

        header { padding: env(safe-area-inset-top) 15px 10px; background: #111; border-bottom: 2px solid var(--neon-pink); display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .stats-bar { display: flex; gap: 8px; font-size: 10px; color: var(--neon-gold); font-weight: bold; }

        .content-scroll { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .user-card { background: var(--glass); border-radius: 15px; padding: 15px; margin-bottom: 12px; border: 1px solid rgba(255,0,127,0.2); }
        .user-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
        .pfp-large { width: 50px; height: 50px; border-radius: 50%; border: 2px solid var(--neon-pink); object-fit: cover; }
        
        .btn-row { display: flex; gap: 6px; }
        .btn-game { flex: 1; border: none; border-radius: 10px; font-size: 10px; font-weight: 800; text-transform: uppercase; cursor: pointer; padding: 12px 5px; color: white; box-shadow: 0 4px 0 rgba(0,0,0,0.5); transition: 0.1s; }
        .btn-pink { background: var(--neon-pink); }
        .btn-dark { background: #1a1a1a; border: 1px solid #333; }
        .btn-game:active { transform: translateY(2px); box-shadow: none; }

        .chat-view { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; z-index: 100; height: 100dvh; }
        .chat-top { padding: env(safe-area-inset-top) 15px 10px; display: flex; align-items: center; gap: 10px; background: #080808; border-bottom: 1px solid #222; }

        #chat-flow { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: radial-gradient(circle at top, #110008 0%, #000 100%); }

        .bubble { max-width: 80%; padding: 12px; border-radius: 18px; font-size: 14px; position: relative; animation: popIn 0.2s cubic-bezier(0.17, 0.89, 0.32, 1.28); }
        @keyframes popIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .sent { align-self: flex-end; background: var(--neon-pink); border-bottom-right-radius: 2px; }
        .recv { align-self: flex-start; background: #222; border-bottom-left-radius: 2px; border: 1px solid #333; }
        
        .msg-meta { font-size: 8px; opacity: 0.6; display: flex; justify-content: space-between; margin-top: 5px; }
        .countdown { color: var(--neon-gold); font-weight: bold; margin-left: 10px; }

        #gift-menu { position: absolute; bottom: 85px; left: 10px; right: 10px; background: rgba(10,10,10,0.98); border: 2px solid var(--neon-gold); border-radius: 20px; display: none; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 15px; z-index: 200; }
        .gift-item { text-align: center; font-size: 10px; padding: 12px; background: #1a1a1a; border-radius: 12px; border: 1px solid #333; }

        .input-area { padding: 10px 15px calc(env(safe-area-inset-bottom) + 10px); background: #000; display: flex; gap: 8px; align-items: center; border-top: 1px solid #222; }
        .input-box { flex: 1; background: #1a1a1a; border-radius: 25px; padding: 12px 18px; border: 1px solid #333; color: white; outline: none; font-size: 16px; }
    </style>
</head>
<body>

<audio id="snd-pop" src="https://actions.google.com/sounds/v1/cartoon/pop.ogg"></audio>

<div id="selector" style="position:fixed; inset:0; background:#000; z-index:2000; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px;">
    <h1 style="color:var(--neon-pink); text-shadow: 0 0 15px var(--neon-pink);">CYBER-LINK</h1>
    <button class="btn-game btn-pink" style="width:240px" onclick="startApp('User_A')">SOY USUARIO A</button>
    <button class="btn-game btn-pink" style="width:240px" onclick="startApp('User_B')">SOY USUARIO B</button>
</div>

<div class="app-shell">
    <header>
        <span id="my-id" style="font-size:10px; color:var(--neon-pink)">ID: ---</span>
        <div class="stats-bar">
            <span>⚡ 100</span> <span>💎 12</span> <span>⭐ 850</span>
        </div>
    </header>

    <div class="content-scroll" id="friends-list"></div>

    <div id="chat-view" class="chat-view">
        <div class="chat-top">
            <span onclick="closeChat()" style="color:var(--neon-pink); font-size:24px; padding-right:10px;">❮</span>
            <img id="chat-pfp" src="" class="pfp-large" style="width:38px; height:38px;">
            <div style="flex:1">
                <div id="chat-name" style="font-size:15px; font-weight:bold;">User</div>
                <div style="font-size:9px; color:var(--neon-blue)">CONEXIÓN ENCRIPTADA</div>
            </div>
        </div>
        
        <div id="chat-flow"></div>

        <div id="gift-menu">
            <div class="gift-item" onclick="sendGift('Estrella ⭐')">⭐<br>5</div>
            <div class="gift-item" onclick="sendGift('Gema 💎')">💎<br>5</div>
            <div class="gift-item" onclick="sendGift('Fuego 🔥')">🔥<br>5</div>
        </div>

        <div class="input-area">
            <span style="font-size:24px; cursor:pointer;" onclick="toggleGifts()">🎁</span>
            <input type="text" id="msg-input" class="input-box" placeholder="Escribe aquí...">
            <button onclick="sendMsg()" style="background:var(--neon-pink); border:none; width:46px; height:46px; border-radius:50%; display:flex; align-items:center; justify-content:center;">
                <svg viewBox="0 0 24 24" width="22" height="22" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
            </button>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/dexie@3.2.4/dist/dexie.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
    // 1. Configuración de IndexedDB (Caja Fuerte del Dispositivo)
    const db = new Dexie("CyberDB");
    db.version(1).stores({ messages: '++id, from, to, text, time, exp, type' });

    const supClient = window.supabase.createClient('https://iitlcnrkgwobzckxwnau.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlpdGxjbnJrZ3dvYnpja3h3bmF1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ5NzcxMzQsImV4cCI6MjA5MDU1MzEzNH0.O4iyR4gF7GQO8AvDpTYRoKjqRsUdNc8hKM80YXboCmE');

    let myId = ""; let targetId = ""; let liveChan = null;

    // 2. Registro de Service Worker
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js').then(() => console.log("SW Activo"));
        // Escuchar si el Worker capturó algo en segundo plano
        navigator.serviceWorker.onmessage = (e) => { if(e.data.type === 'REFRESH_CHAT') render(true); };
    }

    function startApp(id) {
        myId = id;
        document.getElementById('selector').style.display = 'none';
        document.getElementById('my-id').innerText = "ID: " + myId;
        renderUsers();
        initRealtime();
    }

    function initRealtime() {
        liveChan = supClient.channel('cyber_v13').on('broadcast', {event:'m'}, (p) => {
            if(p.payload.to === myId) {
                saveToDB(p.payload, 'recv');
                document.getElementById('snd-pop').play().catch(()=>{});
            }
        }).subscribe();
    }

    // FUNCIÓN PARA QUE EL DISPOSITIVO CAPTURE Y GUARDE
    async function saveToDB(msg, type) {
        await db.messages.add({
            from: msg.from, to: msg.to, text: msg.text,
            time: msg.h || new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            exp: msg.exp || (Date.now() + 1800000),
            type: type
        });
        render(true);
    }

    async function sendMsg() {
        const inp = document.getElementById('msg-input');
        if(!inp.value) return;

        const data = { 
            from: myId, to: targetId, text: inp.value, 
            h: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}),
            exp: Date.now() + 1800000 
        };

        liveChan.send({type:'broadcast', event:'m', payload: data});
        await saveToDB(data, 'sent');
        inp.value = "";
    }

    async function sendGift(n) {
        const data = { from: myId, to: targetId, text: "🎁 Regaló: " + n, h: new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), exp: Date.now() + 1800000 };
        liveChan.send({type:'broadcast', event:'m', payload: data});
        await saveToDB(data, 'sent');
        toggleGifts();
    }

    async function render(full = false) {
        const flow = document.getElementById('chat-flow');
        if(!flow || !targetId) return;

        const now = Date.now();
        // Leemos del dispositivo filtrando por la conversación actual
        const history = await db.messages
            .filter(m => (m.from === targetId && m.to === myId) || (m.from === myId && m.to === targetId))
            .toArray();

        if(full) {
            flow.innerHTML = history.filter(m => m.exp > now).map(m => `
                <div class="bubble ${m.type}">
                    ${m.text}
                    <div class="msg-meta">
                        <span>${m.time}</span>
                        <span class="countdown" data-exp="${m.exp}">--:--</span>
                    </div>
                </div>
            `).join('');
            flow.scrollTop = flow.scrollHeight;
        }
        updateCountdowns();
    }

    function renderUsers() {
        const users = [{id:'User_A', pfp:'https://i.pravatar.cc/150?u=a'}, {id:'User_B', pfp:'https://i.pravatar.cc/150?u=b'}];
        const list = document.getElementById('friends-list');
        list.innerHTML = users.filter(u => u.id !== myId).map(u => `
            <div class="user-card">
                <div class="user-header"><img src="${u.pfp}" class="pfp-large"><h4>${u.id}</h4></div>
                <div class="btn-row">
                    <button class="btn-game btn-pink" onclick="targetId='${u.id}'; openChat('${u.pfp}', '${u.id}')">CHATEAR</button>
                </div>
            </div>`).join('');
    }

    function openChat(pfp, id) {
        document.getElementById('chat-pfp').src = pfp;
        document.getElementById('chat-name').innerText = id;
        document.getElementById('chat-view').style.display = 'flex';
        render(true);
    }

    function closeChat() { document.getElementById('chat-view').style.display = 'none'; }
    function toggleGifts() { const m = document.getElementById('gift-menu'); m.style.display = (m.style.display === 'grid') ? 'none' : 'grid'; }

    function updateCountdowns() {
        const now = Date.now();
        document.querySelectorAll('.countdown').forEach(el => {
            const exp = parseInt(el.getAttribute('data-exp'));
            const diff = Math.max(0, Math.round((exp - now) / 1000));
            el.innerText = `${Math.floor(diff/60)}:${(diff%60).toString().padStart(2,'0')}`;
        });
    }
    setInterval(updateCountdowns, 1000);
</script>
</body>
</html>
